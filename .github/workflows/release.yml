# Made with much help from AI
# Builds and releases binaries for Linux, Windows, and macOS (universal)
# Bundles ExifTool with each release
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: GoogleTakeoutFixer
  GO_VERSION: stable

jobs:
  build-linux:
    name: Build asset (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - name: Build + bundle ExifTool + archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist bundle
          
          # Build binary
          CGO_ENABLED=1 go build -ldflags "-s -w" -o dist/${APP_NAME} ./cmd/main.go
          mv dist/${APP_NAME} bundle/

          # Download ExifTool
          ET_VER="$(curl -s https://exiftool.org/ver.txt)"
          echo "Detected ExifTool version: ${ET_VER}"
          curl -f -L -A "GitHubAction" -o exiftool.archive "https://exiftool.org/Image-ExifTool-${ET_VER}.tar.gz"
          tar -xf exiftool.archive
          EXIF_DIR="$(find . -maxdepth 1 -type d -name "Image-ExifTool*" -print -quit)"
          cp "${EXIF_DIR}/exiftool" bundle/
          cp -r "${EXIF_DIR}/lib" bundle/
          
          # Create simple run script (Robuster gegen Pfad-Probleme)
          echo '#!/bin/bash' > bundle/run.sh
          echo 'cd "$(dirname "$0")"' >> bundle/run.sh
          echo 'chmod +x ./'"${APP_NAME}" >> bundle/run.sh
          echo './'"${APP_NAME}" >> bundle/run.sh
          
          # Set permissions
          chmod +x bundle/exiftool bundle/${APP_NAME} bundle/run.sh

          (cd bundle && tar -czf "../${APP_NAME}_Linux_x64.tar.gz" .)

      - name: Upload Artifact (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: asset-linux
          path: ${{ env.APP_NAME }}_Linux_x64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build asset (Windows x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install MinGW-w64 (Cross-Compiler)
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64 zip

      - name: Build + bundle ExifTool + archive
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          # Use the MinGW compiler for CGO
          CC: x86_64-w64-mingw32-gcc
        run: |
          set -euo pipefail
          mkdir -p dist bundle
          
          # Windows-GUI build (hides console, fixes some initialization issues)
          go build -ldflags "-s -w -H=windowsgui" -o dist/${APP_NAME}.exe ./cmd/main.go
          mv dist/${APP_NAME}.exe bundle/

          # Download ExifTool (Windows Version)
          ET_VER="$(curl -s https://exiftool.org/ver.txt)"
          echo "Detected ExifTool version: ${ET_VER}"
          curl -f -L -A "GitHubAction" -o exiftool.zip "https://exiftool.org/exiftool-${ET_VER}_64.zip"
          unzip -q exiftool.zip

          # Locate and move exiftool
          EXE_PATH="$(find . -maxdepth 3 -type f -name 'exiftool(-k).exe' -print -quit)"
          [[ -n "${EXE_PATH}" ]] || (echo "Could not find exiftool(-k).exe after unzip" >&2 && exit 1)
          mv "${EXE_PATH}" bundle/exiftool.exe

          # Copy extra files if they exist
          FILES_DIR="$(find . -maxdepth 3 -type d -name 'exiftool_files' -print -quit)"
          if [[ -n "${FILES_DIR}" ]]; then
            cp -r "${FILES_DIR}" bundle/
          fi

          (cd bundle && zip -r "../${APP_NAME}_Windows_x64.zip" .)

      - name: Upload Artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: asset-windows
          path: ${{ env.APP_NAME }}_Windows_x64.zip
          if-no-files-found: error

  build-macos-amd64:
    name: Build binary (macOS amd64 artifact)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies (macOS)
        run: |
          brew update
          brew install pkg-config

      - name: Build Binary (amd64)
        shell: bash
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -ldflags "-s -w" -o dist/${APP_NAME}_amd64 ./cmd/main.go

      - name: Upload Artifact (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-amd64-binary
          path: dist/${{ env.APP_NAME }}_amd64
          if-no-files-found: error

  build-macos-arm64:
    name: Build binary (macOS arm64 artifact)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies (macOS)
        run: |
          brew update
          brew install pkg-config

      - name: Build Binary (arm64)
        shell: bash
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -ldflags "-s -w" -o dist/${APP_NAME}_arm64 ./cmd/main.go

      - name: Upload Artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-binary
          path: dist/${{ env.APP_NAME }}_arm64
          if-no-files-found: error

  package-macos-universal:
    name: Build asset (macOS universal)
    runs-on: macos-14
    needs: [build-macos-amd64, build-macos-arm64]
    steps:
      - name: Download Artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: macos-amd64-binary
          path: dist

      - name: Download Artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-binary
          path: dist

      - name: Lipo + bundle ExifTool + archive
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist
          lipo -create -output dist/${APP_NAME} dist/${APP_NAME}_amd64 dist/${APP_NAME}_arm64
          chmod +x dist/${APP_NAME}
          lipo -info dist/${APP_NAME}

          mkdir -p bundle
          mv dist/${APP_NAME} bundle/

          ET_VER="$(curl -s https://exiftool.org/ver.txt)"
          echo "Detected ExifTool version: ${ET_VER}"
          curl -f -L -A "GitHubAction" -o exiftool.archive "https://exiftool.org/Image-ExifTool-${ET_VER}.tar.gz"
          tar -xf exiftool.archive
          EXIF_DIR="$(find . -maxdepth 1 -type d -name "Image-ExifTool*" -print -quit)"
          cp "${EXIF_DIR}/exiftool" bundle/
          cp -r "${EXIF_DIR}/lib" bundle/
          chmod +x bundle/exiftool bundle/${APP_NAME}

          (cd bundle && tar -czf "../${APP_NAME}_macOS_universal.tar.gz" .)

      - name: Upload Artifact (macOS universal)
        uses: actions/upload-artifact@v4
        with:
          name: asset-macos
          path: ${{ env.APP_NAME }}_macOS_universal.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release (all assets)
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, package-macos-universal]
    steps:
      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: .
          merge-multiple: true

      - name: List assets
        shell: bash
        run: ls -la .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.APP_NAME }}_Linux_x64.tar.gz
            ${{ env.APP_NAME }}_Windows_x64.zip
            ${{ env.APP_NAME }}_macOS_universal.tar.gz
          fail_on_unmatched_files: true
          draft: true
          prerelease: false
